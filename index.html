<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Contact — SealMath</title>
    <style>
        body {
            font-family: system-ui, Arial;
            padding: 28px;
            max-width: 720px;
            margin: auto;
        }

        label {
            display: block;
            margin-top: 12px;
        }

        input, textarea {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }

        button {
            margin-top: 14px;
            padding: 10px 16px;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            line-height: 1.6;
        }

        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        input[type="number"] {
            width: 60px;
            height: 40px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            border: 2px solid #333;
            border-radius: 8px;
        }

        /* Unique background colors */
        #n1 {
            background-color: #FFD1DC;
        }

        #n2 {
            background-color: #C1E1C1;
        }

        #n3 {
            background-color: #AEC6CF;
        }

        #n4 {
            background-color: #FDFD96;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        button {
            padding: 10px 15px;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            color: white;
            transition: 0.2s;
        }

        .btn-solve {
            background-color: #34495e;
        }

        .btn-solve:hover {
            background-color: #2c3e50;
        }

        .btn-generate {
            background-color: #27ae60;
        }

        .btn-generate:hover {
            background-color: #219150;
        }

        #result {
            margin-top: 20px;
            font-weight: bold;
            font-size: 1.2rem;
            color: #2c3e50;
            min-height: 1.5em;
        }
    </style>
</head>
<body>
<h2>24 Game Solver</h2>
<p>Enter four numbers (1-13) or generate a new puzzle:</p>

<div class="input-row">
    <input type="number" id="n1" min="1" max="13" value="4">
    <input type="number" id="n2" min="1" max="13" value="7">
    <input type="number" id="n3" min="1" max="13" value="8">
    <input type="number" id="n4" min="1" max="13" value="8">
</div>

<div class="controls">
    <button class="btn-solve" onclick="runSolver()">Find Solution</button>
    <button class="btn-generate" onclick="generateSolvable()">New Solvable Puzzle</button>
</div>

<div id="result"></div>

<script>
    function solve24(numbers) {
        const target = 24;
        const precision = 0.001;

        function backtrack(list) {
            if (list.length === 1) {
                return Math.abs(list[0].val - target) < precision ? list[0].expr : null;
            }
            for (let i = 0; i < list.length; i++) {
                for (let j = 0; j < list.length; j++) {
                    if (i === j) continue;
                    const remaining = list.filter((_, idx) => idx !== i && idx !== j);
                    const a = list[i];
                    const b = list[j];
                    const ops = [
                        { val: a.val + b.val, expr: `(${a.expr}+${b.expr})` },
                        { val: a.val - b.val, expr: `(${a.expr}-${b.expr})` },
                        { val: a.val * b.val, expr: `(${a.expr}*${b.expr})` },
                        { val: Math.abs(b.val) > precision ? a.val / b.val : null, expr: `(${a.expr}/${b.expr})` }
                    ];
                    for (let op of ops) {
                        if (op.val === null) continue;
                        const res = backtrack([...remaining, op]);
                        if (res) return res;
                    }
                }
            }
            return null;
        }
        return backtrack(numbers.map(n => ({ val: n, expr: n.toString() })));
    }

    function runSolver() {
        const nums = [
            parseFloat(document.getElementById('n1').value),
            parseFloat(document.getElementById('n2').value),
            parseFloat(document.getElementById('n3').value),
            parseFloat(document.getElementById('n4').value)
        ];

        if (nums.some(isNaN)) {
            document.getElementById('result').innerText = "Please enter four valid numbers.";
            return;
        }

        const solution = solve24(nums);
        document.getElementById('result').innerText = solution ? `Solution: ${solution}` : "No solution possible.";
    }

    function generateSolvable() {
        let found = false;
        let randomNums = [];

        // Clear result and show loading state
        document.getElementById('result').innerText = "Generating...";

        while (!found) {
            randomNums = Array.from({ length: 4 }, () => Math.floor(Math.random() * 13) + 1);
            if (solve24(randomNums)) {
                found = true;
            }
        }

        // Update inputs
        document.getElementById('n1').value = randomNums[0];
        document.getElementById('n2').value = randomNums[1];
        document.getElementById('n3').value = randomNums[2];
        document.getElementById('n4').value = randomNums[3];

        document.getElementById('result').innerText = "New puzzle ready! Try to solve it.";
    }
</script>
<h1>Contact — SealMath</h1>
<form id="contact-form">
    <label>
        Your name
        <input type="text" name="from_name" required/>
    </label>

    <label>
        Your email
        <input type="email" name="reply_to" required/>
    </label>

    <label>
        Message
        <textarea name="message" rows="6" required></textarea>
    </label>

    <button type="submit">Send here</button>
</form>

<div id="status" style="margin-top:12px;"></div>

<script src="https://cdn.emailjs.com/dist/email.min.js"></script>
<script>
    // Replace these with your EmailJS IDs
    const SERVICE_ID = 'service_lq91rap';
    const TEMPLATE_ID = 'template_n4ns66m';
    const PUBLIC_KEY = '52VtQNv4lmH3Jg7fP';

    // init EmailJS
    (function () {
        emailjs.init(PUBLIC_KEY);
    })();

    // Sending the form using EmailJS (Simplified, no attachment logic needed)
    const form = document.getElementById('contact-form');
    const status = document.getElementById('status');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        status.textContent = 'Sending…';

        try {
            // emailjs.sendForm sends the data without needing any file handling
            await emailjs.sendForm(SERVICE_ID, TEMPLATE_ID, form);

            status.textContent = 'Message sent — check your email!';
            form.reset();
        } catch (err) {
            console.error(err);
            status.textContent = 'Send failed: ' + (err.text || err.message || 'check console');
        }
    });
</script>
</body>
</html>
