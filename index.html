<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Contact — SealMath</title>
    <style>
        body { font-family: system-ui, Arial; padding: 28px; max-width: 720px; margin: auto; }
        label { display:block; margin-top:12px; }
        input, textarea { width:100%; padding:8px; box-sizing:border-box; }
        button { margin-top:14px; padding:10px 16px; border-radius:6px; cursor:pointer; }
    </style>
</head>
<body>
<h2>24 Game Solver</h2>
<p>Enter four numbers (1-9):</p>
<div>
    <input type="number" id="n1" min="1" max="9" value="4">
    <input type="number" id="n2" min="1" max="9" value="7">
    <input type="number" id="n3" min="1" max="9" value="8">
    <input type="number" id="n4" min="1" max="9" value="8">
</div>
<br>
<button onclick="runSolver()">Find Solution</button>

<div id="result"></div>

<script>
    function solve24(numbers) {
        const target = 24;
        const precision = 0.001;

        function backtrack(list) {
            if (list.length === 1) {
                return Math.abs(list[0].val - target) < precision ? list[0].expr : null;
            }
            for (let i = 0; i < list.length; i++) {
                for (let j = 0; j < list.length; j++) {
                    if (i === j) continue;
                    const remaining = list.filter((_, idx) => idx !== i && idx !== j);
                    const a = list[i];
                    const b = list[j];
                    const ops = [
                        { val: a.val + b.val, expr: `(${a.expr}+${b.expr})` },
                        { val: a.val - b.val, expr: `(${a.expr}-${b.expr})` },
                        { val: a.val * b.val, expr: `(${a.expr}*${b.expr})` },
                        { val: Math.abs(b.val) > precision ? a.val / b.val : null, expr: `(${a.expr}/${b.expr})` }
                    ];
                    for (let op of ops) {
                        if (op.val === null) continue;
                        const res = backtrack([...remaining, op]);
                        if (res) return res;
                    }
                }
            }
            return null;
        }
        return backtrack(numbers.map(n => ({ val: n, expr: n.toString() })));
    }

    function runSolver() {
        const nums = [
            parseFloat(document.getElementById('n1').value),
            parseFloat(document.getElementById('n2').value),
            parseFloat(document.getElementById('n3').value),
            parseFloat(document.getElementById('n4').value)
        ];
        const solution = solve24(nums);
        document.getElementById('result').innerText = solution ? `Solution: ${solution}` : "No solution possible.";
    }
</script>
<h1>Contact — SealMath</h1>
<form id="contact-form">
    <label>
        Your name
        <input type="text" name="from_name" required />
    </label>

    <label>
        Your email
        <input type="email" name="reply_to" required />
    </label>

    <label>
        Message
        <textarea name="message" rows="6" required></textarea>
    </label>

    <button type="submit">Send here</button>
</form>

<div id="status" style="margin-top:12px;"></div>

<script src="https://cdn.emailjs.com/dist/email.min.js"></script>
<script>
    // Replace these with your EmailJS IDs
    const SERVICE_ID = 'service_lq91rap';
    const TEMPLATE_ID = 'template_n4ns66m';
    const PUBLIC_KEY = '52VtQNv4lmH3Jg7fP';

    // init EmailJS
    (function(){
        emailjs.init(PUBLIC_KEY);
    })();

    // Sending the form using EmailJS (Simplified, no attachment logic needed)
    const form = document.getElementById('contact-form');
    const status = document.getElementById('status');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        status.textContent = 'Sending…';

        try {
            // emailjs.sendForm sends the data without needing any file handling
            await emailjs.sendForm(SERVICE_ID, TEMPLATE_ID, form);

            status.textContent = 'Message sent — check your email!';
            form.reset();
        } catch (err) {
            console.error(err);
            status.textContent = 'Send failed: ' + (err.text || err.message || 'check console');
        }
    });
</script>
</body>
</html>
