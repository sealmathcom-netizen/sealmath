<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>SealMath – Online Math Challenges</title>
    <meta name="description"
        content="Test your math skills with the 24 Challenge. Generate solvable puzzles, track your history, and find solutions using four numbers and basic operators.">
    <link rel="icon" type="image/x-icon" href="favicon.png">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav>
        <a href="#" id="link-game" class="active" onclick="showPage('game')">24 Challenge</a>
        <a href="#" id="link-contact" onclick="showPage('contact')">Contact</a>
    </nav>

    <section id="game-page" class="page active">
        <div class="container">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h1 style="margin:0; font-size: 1.8rem;">The 24 Challenge</h1>
                <span id="puzzle-counter" style="font-size: 0.8rem; color: #7f8c8d; font-weight: bold;">Puzzle #0</span>
            </div>

            <div class="input-row">
                <input type="number" id="n1" min="1" max="13" placeholder="?" oninput="updateAddButtonState()">
                <input type="number" id="n2" min="1" max="13" placeholder="?" oninput="updateAddButtonState()">
                <input type="number" id="n3" min="1" max="13" placeholder="?" oninput="updateAddButtonState()">
                <input type="number" id="n4" min="1" max="13" placeholder="?" oninput="updateAddButtonState()">
            </div>

            <div style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
                <button class="btn-generate" onclick="generateSolvable()">New Puzzle</button>
                <button class="btn-generate" onclick="generateAll()" style="background-color: var(--accent);">Generate
                    All</button>
                <button class="btn-solve" onclick="runSolver()">Show Answer</button>
                <button id="btn-manual-add" class="btn-solve"
                    style="background-color: var(--blue); color: var(--dark); opacity: 0.5;" onclick="manualRegister()"
                    disabled>Add to History
                </button>
            </div>

            <div class="nav-controls">
                <button id="btn-back" class="btn-nav" onclick="navigateHistory(-1)">&larr; Back</button>
                <button id="btn-next" class="btn-nav" onclick="navigateHistory(1)">Next &rarr;</button>
            </div>

            <div id="goto-section" style="display: none; margin-top: 15px; justify-content: center; gap: 10px; align-items: center;">
                <div class="input-with-prefix" style="width: 120px; height: 40px; border-radius: 8px;">
                    <span>#</span>
                    <input type="number" id="goto-input" min="1" placeholder="" oninput="validateGoToInput()">
                </div>
                <button id="btn-goto" class="btn-nav" onclick="goToPuzzle()" style="width: 120px; height: 40px; padding: 0; margin: 0; white-space: nowrap; transition: 0.2s;" disabled>Go to puzzle</button>
            </div>

            <div class="solution-section">
                <input type="text" id="userExpr" placeholder="(4 + 8) * (8 - 6)"
                    oninput="this.value = this.value.replace(/[^0-9+\-*/().\s]/g, '')">
                <button class="btn-check" onclick="checkUserSolution()">Check My Solution</button>
                <div id="feedback" style="margin-top: 10px; font-weight: bold;"></div>
            </div>
            <div id="result" style="margin-top: 15px; font-weight: bold;"></div>

            <hr style="border: 0; border-top: 1px solid #eee; margin: 25px 0 15px 0;">
            <label
                style="font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;">
                <input type="checkbox" id="storage-toggle" onchange="toggleStoragePreference()"> Remember my puzzle
                history
            </label>
            <button onclick="clearAllHistory()" class="btn-clear-minimal">Clear All History</button>
        </div>
    </section>

    <section id="contact-page" class="page">
        <div class="container" style="max-width: 500px;">
            <h2 style="text-align: center;">Contact SealMath</h2>
            <form id="contact-form">
                <label>Name</label><input type="text" name="from_name" required />
                <label>Email</label><input type="email" name="reply_to" required />
                <label>Message</label><textarea name="message" rows="4" required></textarea>
                <button type="submit" class="btn-submit">Send Message</button>
            </form>
            <div id="status" style="margin-top:12px; text-align: center; font-weight: bold;"></div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
